<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#F0E8D6"/>

  <!-- Outer decorative rings -->
  <circle cx="500" cy="500" r="470" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
  <circle cx="500" cy="500" r="460" fill="none" stroke="#8B6F47" stroke-width="0.5" opacity="0.15"/>
  <circle cx="500" cy="500" r="440" fill="none" stroke="#C9A84C" stroke-width="4" opacity="0.12"/>
  <circle cx="500" cy="500" r="430" fill="none" stroke="#8B6F47" stroke-width="1" opacity="0.1"/>

  <!-- Clock face fill -->
  <circle cx="500" cy="500" r="420" fill="#F8F2E4" opacity="0.85"/>

  <!-- Inner ring -->
  <circle cx="500" cy="500" r="415" fill="none" stroke="#8B6F47" stroke-width="1.5" opacity="0.25"/>
  <circle cx="500" cy="500" r="400" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>

  <!-- Decorative pattern ring - small diamonds at each hour -->
  <g fill="#C9A84C" opacity="0.3">
    <rect x="496" y="92" width="8" height="8" transform="rotate(45 500 96)"/>
    <rect x="496" y="892" width="8" height="8" transform="rotate(45 500 896)"/>
    <rect x="96" y="496" width="8" height="8" transform="rotate(45 100 500)"/>
    <rect x="896" y="496" width="8" height="8" transform="rotate(45 900 500)"/>
  </g>

  <!-- Major tick marks (every 5 minutes / each hour) -->
  <g stroke="#8B6F47" stroke-width="3" stroke-linecap="round" opacity="0.4">
    <line x1="500" y1="100" x2="500" y2="148"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(30 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(60 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(90 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(120 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(150 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(180 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(210 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(240 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(270 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(300 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="148" transform="rotate(330 500 500)"/>
  </g>

  <!-- Minor tick marks (each minute) -->
  <g stroke="#8B6F47" stroke-width="1.2" stroke-linecap="round" opacity="0.25">
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(6 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(12 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(18 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(24 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(36 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(42 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(48 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(54 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(66 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(72 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(78 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(84 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(96 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(102 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(108 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(114 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(126 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(132 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(138 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(144 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(156 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(162 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(168 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(174 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(186 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(192 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(198 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(204 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(216 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(222 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(228 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(234 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(246 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(252 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(258 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(264 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(276 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(282 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(288 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(294 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(306 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(312 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(318 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(324 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(336 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(342 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(348 500 500)"/>
    <line x1="500" y1="100" x2="500" y2="128" transform="rotate(354 500 500)"/>
  </g>

  <!-- Roman Numerals -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#5C3D2E" opacity="0.45" text-anchor="middle" dominant-baseline="central">
    <text x="500" y="168" font-size="42" font-weight="bold">XII</text>
    <text x="704" y="216" font-size="34">I</text>
    <text x="832" y="344" font-size="34">II</text>
    <text x="876" y="500" font-size="38" font-weight="bold">III</text>
    <text x="832" y="658" font-size="34">IV</text>
    <text x="704" y="786" font-size="34">V</text>
    <text x="500" y="836" font-size="42" font-weight="bold">VI</text>
    <text x="296" y="786" font-size="34">VII</text>
    <text x="168" y="658" font-size="34">VIII</text>
    <text x="124" y="500" font-size="38" font-weight="bold">IX</text>
    <text x="168" y="344" font-size="34">X</text>
    <text x="296" y="216" font-size="34">XI</text>
  </g>

  <!-- Sub-dial (small seconds) at 6 o'clock -->
  <circle cx="500" cy="680" r="55" fill="none" stroke="#8B6F47" stroke-width="1" opacity="0.2"/>
  <circle cx="500" cy="680" r="50" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <g stroke="#8B6F47" stroke-width="1" opacity="0.2">
    <line x1="500" y1="632" x2="500" y2="638" />
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(30 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(60 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(90 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(120 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(150 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(180 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(210 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(240 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(270 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(300 500 680)"/>
    <line x1="500" y1="632" x2="500" y2="638" transform="rotate(330 500 680)"/>
  </g>
  <!-- Sub-dial hand -->
  <line x1="500" y1="680" x2="500" y2="640" stroke="#5C3D2E" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <circle cx="500" cy="680" r="3" fill="#8B6F47" opacity="0.3"/>

  <!-- Hour hand (~10:10 position) -->
  <g opacity="0.22">
    <polygon points="500,500 492,360 500,340 508,360" fill="#2C1810" transform="rotate(-60 500 500)"/>
    <polygon points="500,500 494,530 500,545 506,530" fill="#2C1810" transform="rotate(-60 500 500)"/>
  </g>

  <!-- Minute hand -->
  <g opacity="0.22">
    <polygon points="500,500 493,240 500,215 507,240" fill="#2C1810" transform="rotate(60 500 500)"/>
    <polygon points="500,500 495,540 500,560 505,540" fill="#2C1810" transform="rotate(60 500 500)"/>
  </g>

  <!-- Seconds hand (thin, red accent) -->
  <g opacity="0.18">
    <line x1="500" y1="560" x2="500" y2="190" stroke="#8B2020" stroke-width="1.5" stroke-linecap="round" transform="rotate(20 500 500)"/>
  </g>

  <!-- Center cap -->
  <circle cx="500" cy="500" r="14" fill="#8B6F47" opacity="0.25"/>
  <circle cx="500" cy="500" r="9" fill="#C9A84C" opacity="0.4"/>
  <circle cx="500" cy="500" r="4" fill="#5C3D2E" opacity="0.5"/>

  <!-- Inner decorative circle -->
  <circle cx="500" cy="500" r="80" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>

  <!-- Vintage text on dial -->
  <text x="500" y="440" font-family="Georgia, serif" font-size="18" fill="#5C3D2E" opacity="0.2" text-anchor="middle" letter-spacing="4">AUTOMATIC</text>
  <text x="500" y="465" font-family="Georgia, serif" font-size="13" fill="#8B6F47" opacity="0.15" text-anchor="middle" letter-spacing="2">17 JEWELS</text>
</svg>
